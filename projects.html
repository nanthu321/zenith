<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zenith — Projects</title>
  <link rel="icon" href="images/zenith.png">
  <link rel="stylesheet" href="styles/index.css">
  <link rel="stylesheet" href="styles/projects.css">
  <link rel="stylesheet" href="styles/dashboard.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" id="prismThemeLink">
</head>
<body>
<div class="explorer-page" id="explorerPage">
  <a href="dashboard.html" class="explorer-page-back-btn" title="Back to Chat">
    <img src="images/zenith.png" alt="Zenith" class="nav-brand-logo">
  </a>

  <div class="vsc-page">
    <!-- Activity Bar -->
    <div class="vsc-activity-bar" style="padding-top:50px">
      <div class="vsc-activity-top">
        <button class="vsc-activity-btn vsc-activity-btn-active" title="Explorer">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
        </button>
        <button class="vsc-activity-btn" title="Search (coming soon)">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M16.5 16.5L21 21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="vsc-activity-bottom">
        <button class="explorer-theme-toggle ett-activity" id="themeToggle" title="Toggle theme">
          <svg class="ett-icon ett-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="ett-icon ett-icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="vsc-sidebar" id="explorerSidebar" style="width:260px">
      <div class="vsc-sidebar-header">
        <span class="vsc-sidebar-title">Explorer</span>
        <div class="vsc-sidebar-header-actions vsc-sidebar-header-actions-visible">
          <button class="vsc-icon-btn" id="refreshProjectsBtn" title="Refresh">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M12 7a5 5 0 01-10 0 5 5 0 019-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M12 1v3H9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>
      <div class="vsc-sidebar-body" id="projectsSidebar">
        <div class="vsc-sidebar-status" id="projectsLoading">
          <svg width="16" height="16" viewBox="0 0 16 16" style="animation:vsc-spin 0.7s linear infinite"><circle cx="8" cy="8" r="6" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="28" stroke-dashoffset="8" stroke-linecap="round" opacity="0.5"/></svg>
          <span>Loading projects...</span>
        </div>
        <div id="projectsList"></div>
        <div class="vsc-sidebar-status" id="projectsEmpty" style="display:none">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none" opacity="0.2"><path d="M6 14v20a4 4 0 004 4h28a4 4 0 004-4V18a4 4 0 00-4-4H26l-4-4H10a4 4 0 00-4 4z" stroke="currentColor" stroke-width="2"/></svg>
          <span class="vsc-empty-text">No projects yet</span>
          <span class="vsc-empty-sub">Ask Zenith to create a project for you</span>
          <a href="dashboard.html" class="vsc-retry-btn">&larr; Back to Chat</a>
        </div>
      </div>
    </div>

    <!-- Resize Handle -->
    <div class="vsc-resize-handle" id="resizeHandle"></div>

    <!-- Editor Panel -->
    <div class="vsc-editor-panel" id="editorPanel">
      <!-- Tab Bar -->
      <div class="vsc-tab-bar" id="tabBar"></div>
      <!-- Breadcrumb -->
      <div class="vsc-breadcrumb" id="breadcrumb"></div>

      <!-- Editor Content (all states managed here) -->
      <div id="editorContent" style="flex:1;display:flex;flex-direction:column;min-height:0">

        <!-- State: Empty (no file open) -->
        <div class="fv-empty" id="stateEmpty">
          <div class="fv-empty-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" style="opacity:0.35">
              <path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6z" fill="none" stroke="currentColor" stroke-width="1.3"/>
              <path d="M14 2v6h6" fill="none" stroke="currentColor" stroke-width="1.3"/>
              <path d="M10 12l-2 2 2 2M14 12l2 2-2 2" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <p>Select a file to view its contents</p>
          <span style="font-size:0.75rem;color:var(--text-muted,#3a5570);margin-top:4px">Click on any file in the tree to open it here</span>
        </div>

        <!-- State: Loading -->
        <div class="fv-empty" id="stateLoading" style="display:none">
          <div class="fv-empty-icon">
            <svg width="36" height="36" viewBox="0 0 16 16" style="animation:vsc-spin 0.8s linear infinite">
              <circle cx="8" cy="8" r="6" fill="none" stroke="var(--text-tertiary,#4a6d88)" stroke-width="2" stroke-dasharray="28" stroke-dashoffset="8" stroke-linecap="round"/>
            </svg>
          </div>
          <p id="loadingText">Loading file&hellip;</p>
        </div>

        <!-- State: Binary -->
        <div class="fv-empty" id="stateBinary" style="display:none">
          <div class="fv-empty-icon">
            <svg width="36" height="36" viewBox="0 0 24 24">
              <rect x="5" y="11" width="14" height="10" rx="2" fill="none" stroke="var(--text-tertiary,#4a6d88)" stroke-width="1.3"/>
              <path d="M8 11V7a4 4 0 118 0v4" fill="none" stroke="var(--text-tertiary,#4a6d88)" stroke-width="1.3"/>
            </svg>
          </div>
          <p>Binary file &mdash; cannot display</p>
          <span id="binaryFileName" style="font-size:0.78rem;color:var(--text-muted,#3a5570);margin-top:4px"></span>
        </div>

        <!-- State: Error -->
        <div class="fv-empty" id="stateError" style="display:none">
          <div class="fv-empty-icon">
            <svg width="36" height="36" viewBox="0 0 24 24">
              <path d="M12 2L2 20h20L12 2z" fill="none" stroke="#ef4444" stroke-width="1.5"/>
              <line x1="12" y1="9" x2="12" y2="14" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
              <circle cx="12" cy="17" r="1" fill="#ef4444"/>
            </svg>
          </div>
          <p id="errorText">Error loading file</p>
          <button class="fv-retry-btn" id="retryBtn">Retry</button>
        </div>

        <!-- State: File Viewer (code + preview) -->
        <div id="stateViewer" class="fv-container" style="display:none">
          <!-- FileViewer Header -->
          <div class="fv-header">
            <div class="fv-tab" id="viewerTab">
              <span class="fv-tab-icon" id="viewerIcon"></span>
              <span class="fv-tab-name" id="viewerName"></span>
            </div>
            <div class="fv-filepath" id="viewerPath"></div>
            <div class="fv-header-right">
              <span class="fv-lang-badge" id="viewerLang"></span>
              <span class="fv-line-count" id="viewerLines"></span>
              <button class="fv-action-btn" id="btnCopy" title="Copy file content">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M3 11V3a2 2 0 012-2h6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                <span class="fv-action-label" id="copyLabel">Copy</span>
              </button>
              <button class="fv-action-btn" id="btnDownload" title="Download file">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 2v8M5 7.5L8 10.5 11 7.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 12.5h10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                <span class="fv-action-label">Download</span>
              </button>
              <button class="fv-action-btn" id="btnWrap" title="Toggle word wrap">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 3h12M2 7h9a2 2 0 010 4H8l1.5-1.5M8 11L9.5 12.5M2 11h3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span class="fv-action-label">Wrap</span>
              </button>
              <!-- ★ PREVIEW BUTTON — shows live output for HTML/CSS/JS files -->
              <button class="fv-action-btn fv-preview-btn" id="btnPreview" title="Preview output (HTML/CSS/JS)" style="display:none">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                  <rect x="1.5" y="2.5" width="13" height="10" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
                  <path d="M1.5 5h13" stroke="currentColor" stroke-width="1.2"/>
                  <circle cx="3.5" cy="3.8" r="0.6" fill="#ef4444"/>
                  <circle cx="5.3" cy="3.8" r="0.6" fill="#f5a623"/>
                  <circle cx="7.1" cy="3.8" r="0.6" fill="#22c55e"/>
                </svg>
                <span class="fv-action-label" id="previewLabel">Preview</span>
              </button>
            </div>
          </div>

          <!-- Body: Code + Preview side-by-side -->
          <div class="fv-body" id="viewerBody">
            <!-- Code area with line numbers -->
            <div class="fv-code-wrapper" id="codeWrapper">
              <div class="fv-line-numbers" id="lineNumbers"></div>
              <pre class="fv-code-pre" id="codePre"><code id="codeBlock"></code></pre>
            </div>

            <!-- ★ LIVE PREVIEW PANEL (iframe sandbox) -->
            <div class="fv-preview-panel" id="previewPanel" style="display:none">
              <div class="fv-preview-toolbar">
                <div class="fv-preview-toolbar-left">
                  <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="2.5" width="13" height="10" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M1.5 5h13" stroke="currentColor" stroke-width="1.2"/><circle cx="3.5" cy="3.8" r="0.6" fill="#ef4444"/><circle cx="5.3" cy="3.8" r="0.6" fill="#f5a623"/><circle cx="7.1" cy="3.8" r="0.6" fill="#22c55e"/></svg>
                  <span class="fv-preview-title">Live Preview</span>
                </div>
                <div class="fv-preview-toolbar-right">
                  <button class="fv-preview-tool-btn" id="previewRefreshBtn" title="Refresh preview">
                    <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M12 7a5 5 0 01-10 0 5 5 0 019-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M12 1v3H9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  </button>
                  <button class="fv-preview-tool-btn" id="previewNewTabBtn" title="Open in new tab">
                    <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M9 2h5v5M14 2L7 9M5 3H3a1 1 0 00-1 1v9a1 1 0 001 1h9a1 1 0 001-1v-2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  </button>
                  <button class="fv-preview-tool-btn" id="previewCloseBtn" title="Close preview">
                    <svg width="13" height="13" viewBox="0 0 12 12" fill="none"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                  </button>
                </div>
              </div>
              <iframe id="previewFrame" class="fv-preview-iframe" sandbox="allow-scripts allow-modals allow-forms allow-same-origin allow-popups"></iframe>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="vsc-statusbar">
    <span class="vsc-statusbar-item" id="statusProject">No project selected</span>
    <span class="vsc-statusbar-item" id="statusFile" style="margin-left:auto">Ready</span>
  </div>
</div>

<script src="scripts/script.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-typescript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-jsx.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-tsx.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-scss.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markdown.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-yaml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-go.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-rust.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-ruby.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-php.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-swift.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-kotlin.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-toml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-docker.min.js"></script>
<script src="scripts/projects.js"></script>
</body>
</html>
