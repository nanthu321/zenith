<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Zenith</title>
  <link rel="icon" href="images/zenith.png">
  <link rel="stylesheet" href="styles/index.css">
  <link rel="stylesheet" href="styles/login_signup.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-bg">
    <div class="auth-orb auth-orb-1"></div>
    <div class="auth-orb auth-orb-2"></div>
    <div class="auth-grid"></div>
  </div>

  <div class="auth-card">
    <div class="auth-logo">
      <img src="images/zenith.png" alt="Zenith Logo" class="auth-brand-logo">
      <div>
        <h1 class="auth-brand">Zenith</h1>
        <p class="auth-brand-sub">Intelligent Task Agent</p>
      </div>
    </div>

    <h2 class="auth-title">Create your account</h2>
    <p class="auth-subtitle">Start building with AI-powered task execution</p>

    <div class="auth-alert auth-alert-error" id="serverError" role="alert" style="display:none">
      <span class="alert-icon">⚠️</span>
      <span id="serverErrorText"></span>
    </div>

    <form class="auth-form" id="registerForm" novalidate>
      <div class="form-field">
        <label class="form-label" for="username">Username</label>
        <div class="input-wrapper" id="usernameWrapper">
          <span class="input-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.3"/><path d="M2 14c0-3.314 2.686-6 6-6s6 2.686 6 6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></span>
          <input id="username" type="text" class="form-input" placeholder="johndoe" autocomplete="username" autofocus>
        </div>
        <span class="form-error" id="usernameError"></span>
      </div>

      <div class="form-field">
        <label class="form-label" for="email">Email</label>
        <div class="input-wrapper" id="emailWrapper">
          <span class="input-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 4h12v8H2V4zm0 0l6 5 6-5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          <input id="email" type="email" class="form-input" placeholder="you@example.com" autocomplete="email">
        </div>
        <span class="form-error" id="emailError"></span>
      </div>

      <div class="form-field">
        <label class="form-label" for="reg-password">Password</label>
        <div class="input-wrapper" id="passwordWrapper">
          <span class="input-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="3" y="7" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M5 7V5a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></span>
          <input id="reg-password" type="password" class="form-input" placeholder="At least 6 characters" autocomplete="new-password">
          <button type="button" class="input-toggle" id="togglePwd" aria-label="Show password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <span class="form-error" id="passwordError"></span>
        <div class="pwd-strength" id="pwdStrength" style="display:none">
          <div class="pwd-bars"><div class="pwd-bar" id="bar1"></div><div class="pwd-bar" id="bar2"></div><div class="pwd-bar" id="bar3"></div><div class="pwd-bar" id="bar4"></div><div class="pwd-bar" id="bar5"></div></div>
          <span class="pwd-label" id="pwdLabel"></span>
        </div>
      </div>

      <button type="submit" class="auth-btn" id="submitBtn">
        Create Account
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </form>

    <p class="auth-footer-text">Already have an account? <a href="login.html" class="auth-link">Sign in</a></p>
    <a href="index.html" class="auth-back-link">← Back to home</a>

    <div class="auth-theme-toggle">
      <button class="theme-toggle theme-toggle-sm theme-dark" id="themeToggle" type="button" title="Switch theme">
        <span class="theme-toggle-track"><span class="theme-toggle-thumb">
          <svg class="theme-icon theme-icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="theme-icon theme-icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </span></span>
      </button>
      <span class="theme-toggle-label">Light mode</span>
    </div>
  </div>
</div>

<script src="scripts/script.js"></script>
<script>
  const form = document.getElementById('registerForm');
  const usernameInput = document.getElementById('username');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('reg-password');
  const togglePwd = document.getElementById('togglePwd');
  const submitBtn = document.getElementById('submitBtn');
  const serverError = document.getElementById('serverError');
  const serverErrorText = document.getElementById('serverErrorText');

  let showPwd = false;
  togglePwd.addEventListener('click', () => {
    showPwd = !showPwd;
    passwordInput.type = showPwd ? 'text' : 'password';
    togglePwd.innerHTML = showPwd
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
      : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
  });

  passwordInput.addEventListener('input', () => {
    const p = passwordInput.value;
    const el = document.getElementById('pwdStrength');
    if (!p) { el.style.display = 'none'; return; }
    el.style.display = 'flex';
    let s = 0;
    if (p.length >= 6) s++;
    if (p.length >= 10) s++;
    if (/[A-Z]/.test(p)) s++;
    if (/[0-9]/.test(p)) s++;
    if (/[^A-Za-z0-9]/.test(p)) s++;
    const labels = ['', 'Weak', 'Fair', 'Good', 'Strong', 'Excellent'];
    const colors = ['', '#ef4444', '#f59e0b', '#eab308', '#10b981', '#10b981'];
    for (let i = 1; i <= 5; i++) document.getElementById('bar' + i).style.background = i <= s ? colors[s] : 'var(--border-default)';
    const lbl = document.getElementById('pwdLabel');
    lbl.textContent = labels[s]; lbl.style.color = colors[s];
  });

  function clearErrors() {
    ['username', 'email', 'password'].forEach(f => {
      const el = document.getElementById(f + 'Error'); if (el) el.textContent = '';
      const w = document.getElementById(f + 'Wrapper'); if (w) w.classList.remove('input-error');
    });
    serverError.style.display = 'none';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearErrors();
    let hasErr = false;
    const uname = usernameInput.value.trim();
    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();

    if (!uname) { document.getElementById('usernameError').textContent = 'Username is required'; document.getElementById('usernameWrapper').classList.add('input-error'); hasErr = true; }
    else if (uname.length < 3) { document.getElementById('usernameError').textContent = 'Username must be at least 3 characters'; document.getElementById('usernameWrapper').classList.add('input-error'); hasErr = true; }
    if (!email) { document.getElementById('emailError').textContent = 'Email is required'; document.getElementById('emailWrapper').classList.add('input-error'); hasErr = true; }
    else if (!/\S+@\S+\.\S+/.test(email)) { document.getElementById('emailError').textContent = 'Enter a valid email'; document.getElementById('emailWrapper').classList.add('input-error'); hasErr = true; }
    if (!password) { document.getElementById('passwordError').textContent = 'Password is required'; document.getElementById('passwordWrapper').classList.add('input-error'); hasErr = true; }
    else if (password.length < 6) { document.getElementById('passwordError').textContent = 'Password must be at least 6 characters'; document.getElementById('passwordWrapper').classList.add('input-error'); hasErr = true; }
    if (hasErr) return;

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="btn-loading"><span class="btn-spinner"></span>Creating account...</span>';

    try {
      const res = await fetch(API_BASE + '/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: uname, email, password })
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error || 'Registration failed');
      const d = data.data || data;
      setCookie('zenith_token', d.token);
      setCookie('zenith_user', JSON.stringify({ user_id: d.user_id, username: d.username, email: d.email }));
      window.location.href = 'dashboard.html';
    } catch (err) {
      serverErrorText.textContent = err.message || 'Registration failed. Please try again.';
      serverError.style.display = 'flex';
    } finally {
      submitBtn.disabled = false;
      submitBtn.innerHTML = 'Create Account <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    }
  });

  [usernameInput, emailInput, passwordInput].forEach(inp => inp.addEventListener('input', clearErrors));
</script>
</body>
</html>
