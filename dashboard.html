<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zenith — Chat</title>
  <link rel="icon" href="images/zenith.png">
  <link rel="stylesheet" href="styles/index.css">
  <link rel="stylesheet" href="styles/dashboard.css">
</head>
<body>
<div class="chat-page" id="chatPage">
  <!-- Mobile overlay -->
  <div class="mobile-overlay" id="mobileOverlay" style="display:none"></div>

  <!-- ═══ Sidebar ═══ -->
  <aside class="sidebar" id="sidebar">
    <!-- Header -->
    <div class="sidebar-header">
      <div class="sidebar-logo" title="Go to home page" onclick="window.location.href='index.html'" style="cursor:pointer">
        <img src="images/zenith.png" alt="Zenith" class="sidebar-brand-logo">
        <span class="sidebar-brand" id="sidebarBrandText">Zenith</span>
      </div>
      <div class="sidebar-header-actions">
        <button class="sidebar-collapse-btn" id="collapseBtn" title="Collapse sidebar">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="3" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.3"/><line x1="9" y1="3" x2="9" y2="15" stroke="currentColor" stroke-width="1.3"/></svg>
        </button>
      </div>
    </div>

    <!-- Actions -->
    <div class="sidebar-actions" id="sidebarActions">
      <button class="sidebar-action-btn" id="newChatBtn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        <span>New chat</span>
      </button>
      <button class="sidebar-action-btn" id="searchBtn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.4"/><path d="M11 11l3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <span>Search</span>
      </button>
    </div>

    <!-- Search -->
    <div class="sidebar-search" id="searchContainer" style="display:none">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.2"/><path d="M10 10l2.5 2.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      <input type="text" class="sidebar-search-input" id="searchInput" placeholder="Search conversations...">
      <button class="search-clear" id="searchClear" style="display:none">×</button>
    </div>

    <!-- Nav tabs -->
    <nav class="sidebar-nav" id="sidebarNav">
      <button class="sidebar-nav-btn sidebar-nav-active" data-tab="chats">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M1.5 2h13v9.5H8.5l-3 3V11.5H1.5V2z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
        <span>Chats</span>
      </button>
      <button class="sidebar-nav-btn" data-tab="tasks">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.3"/><path d="M8 4.5v3.5l2.5 2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        <span>Tasks</span>
        <span class="nav-badge" id="tasksBadge" style="display:none">0</span>
      </button>
      <button class="sidebar-nav-btn" onclick="window.location.href='projects.html'" title="Open Projects">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="2" width="13" height="12" rx="1.5" stroke="currentColor" stroke-width="1.3"/><line x1="5.5" y1="2" x2="5.5" y2="14" stroke="currentColor" stroke-width="1.3"/><line x1="5.5" y1="5.5" x2="14.5" y2="5.5" stroke="currentColor" stroke-width="1.3"/></svg>
        <span>Projects</span>
      </button>
    </nav>

    <!-- Session list -->
    <div class="sidebar-content" id="sidebarContent">
      <div class="sidebar-section-label" id="recentsLabel" style="display:none">Recents</div>
      <ul class="session-list" id="sessionList" role="list"></ul>
      <!-- Tasks panel placeholder -->
      <div id="tasksPanel" style="display:none">
        <div class="panel-empty"><div class="panel-empty-icon">⏰</div><p>No scheduled tasks yet</p><span class="panel-empty-hint">Ask Zenith to schedule a recurring task</span></div>
      </div>
      <!-- Loading -->
      <div class="sidebar-loading" id="sessionsLoading" style="display:none">
        <div class="spinner spinner-sm"></div>
      </div>
      <!-- Empty state -->
      <div class="sidebar-empty" id="sessionsEmpty" style="display:none">
        <div class="empty-icon">💬</div>
        <p>No conversations yet</p>
        <button class="empty-start-btn" id="emptyStartBtn">Start one →</button>
      </div>
    </div>

    <!-- Footer -->
    <div class="sidebar-footer">
      <div class="sidebar-footer-row">
        <button class="theme-toggle theme-toggle-sm theme-dark" id="themeToggle" type="button" title="Switch theme">
          <span class="theme-toggle-track"><span class="theme-toggle-thumb">
            <svg class="theme-icon theme-icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg class="theme-icon theme-icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          </span></span>
        </button>
      </div>
      <!-- Profile trigger -->
      <div class="pm-trigger" id="profileTrigger">
        <div class="pm-avatar" id="profileAvatar">NA</div>
        <div class="pm-user-info">
          <span class="pm-user-name" id="profileName">User</span>
          <span class="pm-user-plan">Free</span>
        </div>
        <svg class="pm-dots" width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="3" r="1.2" fill="currentColor"/><circle cx="8" cy="8" r="1.2" fill="currentColor"/><circle cx="8" cy="13" r="1.2" fill="currentColor"/></svg>
      </div>
    </div>
  </aside>

  <!-- ═══ Main Chat Area ═══ -->
  <main class="chat-main" id="chatMain">
    <!-- Mobile topbar -->
    <div class="mobile-topbar">
      <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Open sidebar">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <span class="mobile-title" id="mobileTitle">Zenith</span>
      <div style="width:36px"></div>
    </div>

    <!-- Chat area -->
    <div class="chat-area chat-area--empty" id="chatArea">
      <!-- Landing (empty state) -->
      <div class="chat-landing" id="chatLanding">
        <div class="landing-brand">
          <img src="images/zenith.png" alt="Zenith" class="landing-logo">
        </div>
        <h1 class="landing-greeting" id="landingGreeting">How can I help you today?</h1>
        <p class="landing-sub">Ask me anything — I can run code, build projects, search the web & schedule tasks.</p>
        <div class="landing-input-wrap">
          <div class="ci-wrapper ci-wrapper--landing">
            <div class="ci-container">
              <div class="ci-box">
                <form class="ci-row" id="landingInputForm" action="javascript:void(0)">
                  <div class="ci-left">
                    <button type="button" class="ci-icon-btn" title="Attach files" disabled>
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
                    </button>
                  </div>
                  <textarea class="ci-textarea" id="landingTextarea" placeholder="Ask me anything…" rows="1"></textarea>
                  <div class="ci-right">
                    <button type="submit" class="ci-send" id="landingSendBtn" disabled>
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 19V5M12 5l-6 6M12 5l6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Messages container (hidden when empty) -->
      <div class="chat-messages" id="chatMessages" style="display:none">
        <div class="messages-list" id="messagesList"></div>
        <div id="messagesBottom"></div>
      </div>

      <!-- Stop generation -->
      <div class="stop-generation-wrapper" id="stopWrapper" style="display:none">
        <button class="stop-generation-btn" id="stopBtn"><span class="stop-icon"></span><span>Stop generating</span></button>
      </div>

      <!-- Bottom input (shown when chat is active) -->
      <div class="ci-wrapper" id="chatInputWrapper" style="display:none">
        <div class="ci-container">
          <div class="ci-box">
            <form class="ci-row" id="chatInputForm" action="javascript:void(0)">
              <div class="ci-left">
                <button type="button" class="ci-icon-btn" title="Attach files" disabled>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
                </button>
              </div>
              <textarea class="ci-textarea" id="chatTextarea" placeholder="Message Zenith..." rows="1"></textarea>
              <div class="ci-right">
                <button type="submit" class="ci-send" id="chatSendBtn" disabled>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 19V5M12 5l-6 6M12 5l6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="scripts/script.js"></script>
<script src="scripts/fetch.js"></script>
</body>
</html>
